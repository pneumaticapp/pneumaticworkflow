name: Build and Push Docker Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'latest'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            realm74/pneumatic-backend
            realm74/pneumatic-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./core
          push: true
          tags: realm74/pneumatic-backend:${{ github.event.inputs.version || 'latest' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
      
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./web-client
          push: true
          tags: realm74/pneumatic-frontend:${{ github.event.inputs.version || 'latest' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
      
      - name: Scan images for vulnerabilities
        run: |
          docker scan realm74/pneumatic-backend:${{ github.event.inputs.version || 'latest' }}
          docker scan realm74/pneumatic-frontend:${{ github.event.inputs.version || 'latest' }}
      
      - name: Notify on success
        if: success()
        run: |
          echo "✅ Docker images built and pushed successfully!"
          echo "Backend: realm74/pneumatic-backend:${{ github.event.inputs.version || 'latest' }}"
          echo "Frontend: realm74/pneumatic-frontend:${{ github.event.inputs.version || 'latest' }}"
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Docker image build failed!"
          echo "Check the logs above for details."
