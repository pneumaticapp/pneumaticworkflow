worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 768;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Logging to stdout/stderr for Railway
    log_format main '[$time_local] $remote_addr [$status $request] upstream=$upstream_addr';
    access_log /dev/stdout main;
    error_log /dev/stderr error;

    # Gzip
    gzip on;
    gzip_disable "msie6";
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Cache control
    map $sent_http_content_type $expires {
        default off;
        text/html epoch;
        text/css max;
        application/javascript max;
        font/woff2 max;
        ~image/ 30d;
    }

    # Dynamic DNS resolver (auto-detected from /etc/resolv.conf in entrypoint)
    resolver ${NAMESERVER} valid=10s;

    # ===========================================
    # Main server — public traffic
    # ===========================================
    server {
        listen ${PORT};
        server_name _;

        # Dynamic upstream variables (forces DNS re-resolve on each request)
        set $upstream_frontend http://${FRONTEND_HOST};
        set $upstream_backend http://${BACKEND_HOST};
        set $upstream_fileservice http://${FILE_SERVICE_HOST};

        # -------------------------------------------
        # Backend API routes (regex — single block for all API paths)
        # Matches: /accounts/, /templates, /workflows, /v2/, /v3/,
        #          /tenants, /reports/, /analytics/, /notifications/,
        #          /navigation/, /webhooks, /services, /payment,
        #          /applications/, /faq, /attachments, /datasets, /pages/
        # -------------------------------------------
        location ~ ^/(accounts|templates|workflows|v2|v3|tenants|reports|analytics|notifications|navigation|webhooks|services|payment|applications|faq|attachments|datasets|pages)(/|$) {
            proxy_pass $upstream_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -------------------------------------------
        # Auth API endpoints (backend only)
        # Excludes /auth/signin/ and /auth/signup/ which are frontend SPA pages
        # -------------------------------------------
        location ~ ^/auth/(context|token|signout|google|microsoft|auth0|okta|verification|resend-verification|change-password|reset-password|superuser) {
            proxy_pass $upstream_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -------------------------------------------
        # File service proxy
        # -------------------------------------------
        location /files/ {
            rewrite ^/files/(.*) /$1 break;
            proxy_pass $upstream_fileservice;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 105m;
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            proxy_request_buffering off;
        }

        # -------------------------------------------
        # WebSocket proxy
        # -------------------------------------------
        location /ws/ {
            proxy_pass $upstream_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # -------------------------------------------
        # Frontend — everything else (SPA pages, static assets)
        # -------------------------------------------
        location / {
            proxy_pass $upstream_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
        }

        expires $expires;
    }

    # ===========================================
    # Private backend — for frontend SSR API calls
    # Listens on port 80 (internal only, not exposed)
    # ===========================================
    server {
        listen 80;
        server_name pneumatic-nginx;

        set $upstream_backend_private http://${BACKEND_HOST};

        location / {
            proxy_pass $upstream_backend_private;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header REMOTE_ADDR $remote_addr;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
