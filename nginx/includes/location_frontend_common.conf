        # Okta logout redirect to backend (temporary workaround)
        # Issue: Okta requires logout URL without port (https://staging.pneumatic.app/auth/okta/logout)
        # but backend runs on port 8001. This location intercepts Okta requests
        # and redirects them directly to backend, bypassing frontend.
        location /auth/okta/logout {
            include /etc/nginx/includes/proxy_to_backend.conf;
        }

        # File service proxy — same origin, no cross-domain cookie issues
        location /files/ {
            rewrite ^/files/(.*) /$1 break;
            proxy_pass http://file-service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 100m;

            # Timeouts for large file uploads (100MB at 1MB/s = 100s)
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # Stream upload directly to file-service without buffering in nginx
            proxy_request_buffering off;
        }

        location / {
            include /etc/nginx/includes/proxy_to_frontend.conf;
        }

        location /robots.txt {
            alias /var/www/robots.txt;
        }
        location = /502.html {
            alias /var/www/html/502.html;
        }

        expires $expires;
        gzip on;
        gzip_disable "msie6";
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
