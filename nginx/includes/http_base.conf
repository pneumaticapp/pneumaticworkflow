    ##
    # Base Settings
    ##

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    # server_tokens off;

    # server_names_hash_bucket_size 64;
    # server_name_in_redirect off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ##
    # Logging Settings
    ##
    log_format main '[$time_local] $remote_addr [Request: $status $request]';
    log_format extended_fmt '[$time_local] Request: [$status $body_bytes_sent $host $request] Client: [$remote_addr $http_referer User-agent: $http_user_agent]';

    access_log /var/log/nginx/access.log main;
    access_log /var/log/nginx/access-extended.log extended_fmt;
    error_log /var/log/nginx/error.log error;

    # Global definition for 502 error page
    error_page 502 /502.html;

    ##
    # Gzip Settings
    ##

    gzip on;

    # gzip_vary on;
    # gzip_proxied any;
    # gzip_comp_level 6;
    # gzip_buffers 16 8k;
    # gzip_http_version 1.1;
    # gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    ##
    # Backend server
    ##

    upstream backend {
        # for UNIX domain socket setups https://docs.gunicorn.org/en/stable/deploy.html
        server unix:/tmp/gunicorn/pneumatic-backend.sock fail_timeout=0;
    }

    ##
    # Frontend server
    ##

    upstream frontend {
      server pneumatic-frontend:8000;
    }

    map $sent_http_content_type $expires {
        default off;
        text/html epoch;
        text/css max;
        application/javascript max;
        font/woff2 max;
        ~image/ 30d;
    }
