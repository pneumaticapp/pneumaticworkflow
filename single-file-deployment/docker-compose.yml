services:
  postgres:
    image: postgres:15-bookworm
    container_name: pneumatic-postgres
    env_file:
      - ./pneumatic.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    expose:
      - 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_user -d postgres_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pneumatic
    restart: always

  redis:
    image: redis:6.2.6
    container_name: pneumatic-redis
    command: >
      redis-server
      --loglevel warning
      --databases 16
      --dbfilename dump.rdb
      --dir /data
      --requirepass redis_password
      --save 20 1 300 100 60 10000
    volumes:
      - redis_data:/data
    ports:
      - 6379:6379
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pneumatic
    restart: always

  rabbitmq:
    container_name: pneumatic-rabbitmq
    image: rabbitmq:3.13-management
    env_file:
      - ./pneumatic.env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    expose:
      - 5672
      - 15672
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pneumatic

  pneumatic-backend:
    image: realm74/pneumatic-backend:latest
    container_name: pneumatic-backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --no-input &&
             python manage.py compilemessages &&
             gunicorn pneumatic_backend.asgi:application --workers 2 -k uvicorn.workers.UvicornWorker --worker-tmp-dir /dev/shm --bind 0.0.0.0:6000 --timeout 200 --access-logfile - --error-logfile -"
    env_file:
      - ./pneumatic.env
    volumes:
      - ./staticfiles/:/pneumatic_backend/staticfiles/
    expose:
      - 6000
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python manage.py check --deploy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - pneumatic
    restart: always

  celery:
    image: realm74/pneumatic-backend:latest
    container_name: pneumatic-celery
    env_file:
      - ./pneumatic.env
    command: >
      sh -c "celery -A pneumatic_backend worker -l warning"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pneumatic
    restart: always

  celery-beat:
    image: realm74/pneumatic-backend:latest
    container_name: pneumatic-celery-beat
    env_file:
      - ./pneumatic.env
    command: celery --pidfile= -A pneumatic_backend beat -l warning -S django
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pneumatic
    restart: always

  pneumatic-frontend:
    image: realm74/pneumatic-frontend:latest
    container_name: pneumatic-frontend
    command: [ "pm2-runtime", "start", "pm2.json" ]
    env_file:
      - ./pneumatic.env
    volumes:
      - ./logs/:/tmp/logs/
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep pm2-runtime | grep -v grep || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - pneumatic
    restart: always

  nginx:
    image: nginx:1.25.4
    container_name: pneumatic-nginx
    ports:
      - 80:80
      - 8001:8001
      - 8002:8002
      - 443:443
    volumes:
      - ./logs/nginx/:/var/log/nginx/
      - ./www/:/var/www/
      - ./staticfiles/:/tmp/pneumatic-backend-staticfiles/
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      pneumatic-backend:
        condition: service_healthy
      pneumatic-frontend:
        condition: service_healthy
    networks:
      - pneumatic
    restart: always

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  pneumatic:
